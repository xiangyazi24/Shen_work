name: Q4892 quick exact Python search

on:
  pull_request:
    branches:
      - chatgpt-scratch
    paths:
      - 'scratch/q4892_quick_trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4892-single-sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install sympy
      - run: python scratch/q4892_quick.py | tee scratch/q4892_quick_result.txt
      - uses: actions/upload-artifact@v4
        with:
          name: q4892-quick-result
          path: scratch/q4892_quick_result.txt
