name: Q4624 N16 symbolic verification
on:
  push:
    branches: [q4624-check]
    paths:
      - '.github/q4624_factor.sing'
      - '.github/workflows/q4624.yml'
  pull_request:
    branches: [chatgpt-scratch]
    paths:
      - '.github/q4624_factor.sing'
      - '.github/workflows/q4624.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4624-check
      - name: Install Singular
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq singular
      - name: Factor quotient polynomials
        run: Singular .github/q4624_factor.sing > .github/q4624-factor-output.txt
      - name: Commit computation output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/q4624-factor-output.txt
          if ! git diff --cached --quiet; then
            git commit -m 'Record Q4624 factor output'
            git push origin HEAD:q4624-check
          fi
