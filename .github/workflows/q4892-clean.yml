name: Q4892 clean exact search

on:
  pull_request:
    branches:
      - chatgpt-scratch
    paths:
      - 'scratch/q4892_clean_trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: q4892-clean-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  search:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4892-run-clean
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install sympy
      - run: python scratch/q4892_quick.py | tee scratch/q4892_clean_result.txt
      - uses: actions/upload-artifact@v4
        with:
          name: q4892-clean-result
          path: scratch/q4892_clean_result.txt
