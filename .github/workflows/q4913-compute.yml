name: Q4913 Birkhoff computation

on:
  push:
    branches: [q4913-compute-run]
    paths:
      - 'tmp/q4913_compute.py'
      - '.github/workflows/q4913-compute.yml'
  pull_request:
    branches: [chatgpt-scratch]
    paths:
      - 'tmp/q4913_compute.py'
      - '.github/workflows/q4913-compute.yml'

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4913-compute-run
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade mpmath
      - name: Compute 200-digit Birkhoff data
        run: python tmp/q4913_compute.py
      - name: Commit result to temporary branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tmp/q4913_result.md
          git diff --cached --quiet || git commit -m 'Record Q4913 Birkhoff computation result'
          git push origin HEAD:q4913-compute-run
