name: q4859 exact Ore factor audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: q4859-exact-factor-audit
  cancel-in-progress: true

jobs:
  sympy-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install current SymPy
        run: python3 -m pip install --upgrade sympy
      - name: Run exact Petkovsek audit
        run: python3 -u q4859_factor_sympy.py
