name: q638-exact-audit
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  calculate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Run exact Q638 audit
        env:
          NMAX: '2500'
          TARGETS: '321,394,717,800'
        run: node scripts/q638_exact.js | tee /tmp/q638.out
      - name: Publish exact output
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = 'Q638 EXACT OUTPUT\n\n```text\n' + fs.readFileSync('/tmp/q638.out','utf8') + '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
