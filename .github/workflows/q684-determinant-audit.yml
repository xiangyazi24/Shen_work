name: q684-determinant-audit
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  calculate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install SymPy
        run: python3 -m pip install --break-system-packages sympy
      - name: Run exact determinant and Smith audit
        run: python3 scripts/q684_determinants.py | tee /tmp/q684.out
      - name: Publish output
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = 'Q684 EXACT DETERMINANT AUDIT\n\n```text\n' + fs.readFileSync('/tmp/q684.out','utf8') + '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
