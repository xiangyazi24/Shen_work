name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  q4970:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Exact mixed-Hankel computation
        run: node drops/q4970-exact-calc.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - uses: leanprover-community/docgen-action@v1
