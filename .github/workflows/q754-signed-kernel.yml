name: q754-signed-kernel
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  calculate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install SymPy
        run: python3 -m pip install sympy
      - name: Run signed-kernel audit
        run: python3 scripts/q754_kernel_audit.py | tee /tmp/q754.out
      - name: Publish exact output
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = 'Q754 SIGNED KERNEL OUTPUT\n\n```text\n' + fs.readFileSync('/tmp/q754.out','utf8') + '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
