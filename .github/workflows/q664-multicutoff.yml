name: q664-multicutoff-audit
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  calculate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Run exact Q664 audit
        run: node scripts/q664_multicutoff.js | tee /tmp/q664.out
      - name: Publish output
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = 'Q664 EXACT OUTPUT\n\n```text\n' + fs.readFileSync('/tmp/q664.out','utf8') + '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
