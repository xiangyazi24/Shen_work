name: q715-reflection-test
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  calculate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run exact p^2 reflection scan
        run: |
          set +e
          python3 scripts/q715_reflection_test.py > /tmp/q715.out 2>&1
          status=$?
          cat /tmp/q715.out
          echo "exit_status=$status" >> /tmp/q715.out
          exit 0
      - name: Publish exact output
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = 'Q715 EXACT OUTPUT\n\n```text\n' + fs.readFileSync('/tmp/q715.out','utf8') + '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
