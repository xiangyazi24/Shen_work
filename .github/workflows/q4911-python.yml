name: Q4911 portable exact computation

on:
  push:
    branches: [q4911-markov-op]
    paths:
      - 'scratch/q4911_markov.py'
      - '.github/workflows/q4911-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scratch/q4911_markov.py'
      - '.github/workflows/q4911-python.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: q4911-python
  cancel-in-progress: true

jobs:
  compute:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4911-markov-op
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade sympy
      - name: Run exact computation
        run: python -u scratch/q4911_markov.py 2>&1 | tee scratch/q4911_python_result.txt
      - name: Commit output
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scratch/q4911_python_result.txt
          git diff --cached --quiet || git commit -m 'Record Q4911 portable computation result'
          git push origin HEAD:q4911-markov-op
