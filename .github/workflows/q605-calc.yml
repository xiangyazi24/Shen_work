name: q605-exact-calc
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  calculate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Run exact BigInt Taylor-moment scan
        env:
          NMAX: '800'
        run: node scripts/q605_exact.js > q605_report.txt
      - name: Post exact report
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file q605_report.txt
