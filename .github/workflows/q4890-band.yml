name: Q4890 exact Sage band search

on:
  push:
    branches:
      - chatgpt-scratch
    paths:
      - '.github/workflows/q4890-band.yml'
      - 'scratch/q4890_band.sage'

permissions:
  contents: write

jobs:
  q4890-search:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt-scratch
      - name: Run Sage search in official container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            sagemath/sagemath:latest \
            sage scratch/q4890_band.sage > scratch/q4890_result.txt 2>&1
      - name: Commit exact output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scratch/q4890_result.txt
          git commit -m "Record Q4890 Sage search output [skip ci]" || exit 0
          git push origin HEAD:chatgpt-scratch
