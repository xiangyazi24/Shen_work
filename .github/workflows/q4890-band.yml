name: Q4890 exact Sage band search

on:
  push:
    branches:
      - chatgpt-scratch
    paths:
      - '.github/workflows/q4890-band.yml'
      - 'scratch/q4890_band.sage'
  pull_request:
    branches:
      - chatgpt-scratch
    paths:
      - 'scratch/q4890_trigger.txt'

permissions:
  contents: read

jobs:
  q4890-search:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt-scratch
      - name: Run Sage search in official container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            sagemath/sagemath:latest \
            sage scratch/q4890_band.sage > scratch/q4890_result.txt 2>&1
      - name: Print exact output
        if: always()
        run: cat scratch/q4890_result.txt || true
      - name: Upload exact output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q4890-result
          path: scratch/q4890_result.txt
